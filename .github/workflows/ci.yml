name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: rechargemax
          POSTGRES_PASSWORD: rechargemax
          POSTGRES_DB: rechargemax_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Apply database schema (tables)
        env:
          PGPASSWORD: rechargemax
        run: |
          for f in $(ls ../database/[0-9]*.sql | sort); do
            psql -h localhost -U rechargemax -d rechargemax_test -f "$f" > /dev/null 2>&1 || true
          done
          echo "✓ Tables created"

      - name: Apply migrations
        env:
          PGPASSWORD: rechargemax
        run: |
          for f in $(ls ../database/migrations/*.sql | sort); do
            psql -h localhost -U rechargemax -d rechargemax_test -f "$f" > /dev/null 2>&1 || true
          done
          echo "✓ Migrations applied"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -timeout 120s
        env:
          DATABASE_URL: postgres://rechargemax:rechargemax@localhost:5432/rechargemax_test?sslmode=disable

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src --ext .ts,.tsx --max-warnings 0 || true

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: /api/v1
