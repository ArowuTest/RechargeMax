name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy-prod:
    name: Build & Push Docker Images (Production)
    runs-on: ubuntu-latest
    environment: production   # requires manual approval in GitHub Environments
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/rechargemax-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/rechargemax-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/rechargemax-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/rechargemax-frontend:${{ github.sha }}
          build-args: VITE_API_BASE_URL=${{ secrets.PROD_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify production deployment
        run: echo "Production deployment triggered for ${{ github.sha }}"
