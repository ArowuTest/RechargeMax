name: Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true

jobs:
  guard:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check secrets and confirmation
        id: check
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKER_USERNAME secret is not set – deployment skipped."
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
               [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Confirmation did not match 'deploy' – skipped."
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-prod:
    name: Build, Push & Migrate (Production)
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/rechargemax-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/rechargemax-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/rechargemax-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/rechargemax-frontend:${{ github.sha }}
          build-args: VITE_API_BASE_URL=${{ secrets.PROD_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run migrations on production database
        if: ${{ secrets.PROD_DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          echo "▶ Applying migrations to production..."
          for f in $(ls database/migrations/*.sql | sort); do
            echo "  → $(basename $f)"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
          echo "✓ Production migrations done"

      - name: Notify production deployment
        run: echo "✅ Production deployment complete for ${{ github.sha }}"
