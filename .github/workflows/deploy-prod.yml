name: Deploy to Production

on:
  # Trigger on version tags (e.g. v1.2.3) — NOT on every main push
  push:
    tags:
      - 'v*.*.*'
  # Also allow fully manual deployment from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true

jobs:
  # ── Guard: only proceed when secrets exist and (if manual) confirm matches ──
  guard:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check secrets and confirmation
        id: check
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKER_USERNAME secret is not set – deployment skipped."
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
               [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Manual trigger confirmation did not match 'deploy' – skipped."
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-prod:
    name: Build & Push Docker Images (Production)
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    environment: production   # requires manual approval gate in GitHub Environments

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/rechargemax-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/rechargemax-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/rechargemax-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/rechargemax-frontend:${{ github.sha }}
          build-args: VITE_API_BASE_URL=${{ secrets.PROD_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify production deployment
        run: echo "Production deployment complete for ${{ github.sha }}"
