name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  guard:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check required secrets
        id: check
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKER_USERNAME secret is not set – staging deployment skipped."
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-staging:
    name: Build & Push Docker Images (Staging)
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rechargemax-backend:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rechargemax-frontend:staging
          build-args: VITE_API_BASE_URL=${{ secrets.STAGING_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run migrations on staging database
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::STAGING_DATABASE_URL not set – skipping migrations."
            exit 0
          fi
          echo "▶ Applying migrations to staging..."
          for f in $(ls database/migrations/*.sql | sort); do
            echo "  → $(basename $f)"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=0 -f "$f" > /dev/null 2>&1 || true
          done
          echo "✓ Staging migrations done"

      - name: Notify staging deployment
        run: echo "✅ Staging deployment complete for ${{ github.sha }}"
