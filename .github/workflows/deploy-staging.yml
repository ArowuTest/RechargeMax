name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:        # allow manual trigger

jobs:
  deploy-staging:
    name: Build & Push Docker Images (Staging)
    runs-on: ubuntu-latest
    environment: staging
    # Skip the entire job if Docker credentials are not configured
    if: ${{ secrets.DOCKER_USERNAME != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rechargemax-backend:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rechargemax-frontend:staging
          build-args: VITE_API_BASE_URL=${{ secrets.STAGING_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify staging deployment
        run: echo "Staging deployment triggered for commit ${{ github.sha }}"
