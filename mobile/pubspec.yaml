name: rechargemax
description: RechargeMax — Recharge & Win. Nigeria's #1 Gamified Recharge Platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Local Cache
  hive_flutter: ^1.1.0

  # UI / Animation
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  confetti: ^0.7.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  pin_code_fields: ^8.0.1
  intl_phone_field: ^3.2.0
  intl: ^0.19.0

  # Utilities
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  clipboard: ^0.1.3
  uuid: ^4.4.0
  timeago: ^3.6.1
  collection: ^1.18.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.7.1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800
