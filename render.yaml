services:
  - type: web
    name: rechargemax-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rechargemax-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: PORT
        value: 8080
      - key: ENVIRONMENT
        value: production

  - type: web
    name: rechargemax-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: starter
    buildArgs:
      VITE_API_BASE_URL: https://rechargemax-backend.onrender.com/api/v1

databases:
  - name: rechargemax-db
    plan: starter
    databaseName: rechargemax
    user: rechargemax
